<div class="bg-slate-100 overflow-y-scroll w-screen h-screen antialiased text-slate-300 selection:bg-blue-600 selection:text-white">
  <div class="flex items-start flex-col relative w-screen">

    <!-- Botón hamburguesa fijo -->
    <button
      class="p-2 text-white bg-gray-800 fixed top-2 left-2 z-50"
      (click)="toggleMenu()">
      ☰
    </button>

    <!-- Menú lateral -->
    <gifs-side-menu [isOpen]="isOpen"></gifs-side-menu>

    <!-- Contenido principal -->
    <div
      class="px-4 flex flex-col h-full text-slate-800 transition-all duration-300"
      [class.ml-[220px]]="isOpen"
      [class.ml-0]="!isOpen">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
